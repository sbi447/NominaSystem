<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistema de Nómina</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/js/app.js" type="module" defer></script>
</head>
<body>
    <div class="container">
        <!-- Encabezado -->
        <header class="header">
            <h1>Sistema de Nómina</h1>
            <p>Gestión de empleados | Recursos Humanos</p>
        </header>

        <!-- Panel de estadísticas -->
        <div class="stats-panel">
            <div class="stat-card">
                <span class="stat-label">Total Empleados</span>
                <span class="stat-value" id="totalEmpleados">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Gasto Mensual Total</span>
                <span class="stat-value" id="gastoTotal">0.00 €</span>
            </div>
        </div>

        <!-- Formulario de registro/edición -->
        <div class="form-container">
            <h2 id="formTitle">Registrar Empleado</h2>
            <form id="empleadoForm">
                <input type="hidden" id="empleadoId" value="">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej. Ana Rodríguez" required>
                </div>
                <div class="form-group">
                    <label for="cedula">Cédula de Identidad</label>
                    <input type="text" id="cedula" placeholder="V-12345678 o E-12345678" required>
                </div>
                <div class="form-group">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo" placeholder="Ej. Desarrollador Frontend" required>
                </div>
                <div class="form-group">
                    <label for="sueldo">Sueldo Mensual</label>
                    <input type="number" id="sueldo" step="0.01" placeholder="Mínimo 1000" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btnGuardar">Guardar</button>
                    <button type="button" class="btn btn-secondary" id="btnCancelar" style="display: none;">Cancelar</button>
                </div>
            </form>
            <div id="mensajeError" class="error-message"></div>
        </div>

        <!-- Barra de búsqueda -->
        <div class="search-container">
            <input type="text" id="buscador" placeholder="🔍 Buscar por cédula o nombre..." autocomplete="off">
        </div>

        <!-- Tabla de empleados -->
        <div class="table-container">
            <table id="empleadosTable">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cédula</th>
                        <th>Cargo</th>
                        <th>Sueldo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    <tr class="fila-vacia">
                        <td colspan="5">No hay empleados registrados</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
